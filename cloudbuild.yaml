steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/election-assistant'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=$_NEXT_PUBLIC_FIREBASE_API_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_NEXT_PUBLIC_FIREBASE_PROJECT_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=$_NEXT_PUBLIC_FIREBASE_APP_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=$_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID'
      - '--build-arg'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/election-assistant']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'election-assistant'
      - '--image'
      - 'gcr.io/$PROJECT_ID/election-assistant'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
images:
  - 'gcr.io/$PROJECT_ID/election-assistant'
substitutions:
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'YOUR_API_KEY'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'YOUR_AUTH_DOMAIN'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'YOUR_PROJECT_ID'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'YOUR_STORAGE_BUCKET'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 'YOUR_SENDER_ID'
  _NEXT_PUBLIC_FIREBASE_APP_ID: 'YOUR_APP_ID'
  _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: 'YOUR_MEASUREMENT_ID'
  _GEMINI_API_KEY: 'YOUR_GEMINI_KEY'
